$kind: http-request
url: "{{baseUrl}}/rest/wikis/{{wiki}}/spaces/{{space}}/pages/{{page}}/comments/{{commentId}}"
method: GET
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('status 200', () => pm.response.to.have.status(200));
      const j = pm.response.json();
      pm.test('el id coincide con el creado', () => {
        pm.expect(String(j.id)).to.eql(String(pm.collectionVariables.get('commentId')));
      });
      pm.test('el texto coincide con el creado', () => {
        pm.expect(j.text).to.eql(pm.collectionVariables.get('commentText'));
      });
    language: text/javascript
order: 3000
