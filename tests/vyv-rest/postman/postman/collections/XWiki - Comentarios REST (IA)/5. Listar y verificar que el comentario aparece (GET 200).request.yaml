$kind: http-request
url: "{{baseUrl}}/rest/wikis/{{wiki}}/spaces/{{space}}/pages/{{page}}/comments"
method: GET
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('status 200', () => pm.response.to.have.status(200));
      const j = pm.response.json();
      pm.test('la lista contiene el comentario creado', () => {
        const textos = j.comments.map(c => c.text);
        pm.expect(textos).to.include(pm.collectionVariables.get('commentText'));
      });
    language: text/javascript
order: 5000
