$kind: http-request
url: "{{baseUrl}}/rest/wikis/{{wiki}}/spaces/{{space}}/pages/{{page}}/comments"
method: GET
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('status 200', () => pm.response.to.have.status(200));
      const j = pm.response.json();
      pm.test('body tiene array comments', () => {
        pm.expect(j).to.have.property('comments');
        pm.expect(j.comments).to.be.an('array');
      });
      pm.test('responde en menos de 3s', () => pm.expect(pm.response.responseTime).to.be.below(3000));
    language: text/javascript
order: 1000
