# ============================================================
# Configuracion de SonarQube (REFERENCIA)
#
# OJO: el analisis real se hace con el plugin Maven desde correr.ps1
# (mvn ... sonar:sonar -D...), y ese flujo IGNORA este archivo.
# Este archivo documenta la config y sirve si alguien usa el
# 'sonar-scanner' CLI en su lugar (corriendolo dentro del modulo del worktree:
#   xwiki-184/xwiki-platform-core/xwiki-platform-rest/xwiki-platform-rest-server)
#
# El TOKEN no va aqui (es secreto): pasalo con  -Dsonar.token=...  o  $env:SONAR_TOKEN
# ============================================================

# --- Proyecto ---
sonar.projectKey=Xwiki
sonar.projectName=Xwiki

# --- Servidor ---
sonar.host.url=http://localhost:9000
# sonar.token=  (NO commitear; usar -Dsonar.token o variable de entorno SONAR_TOKEN)

# --- Codigo fuente y binarios (rutas relativas al modulo) ---
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes
sonar.sourceEncoding=UTF-8

# --- Cobertura (reporte JaCoCo) ---
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# --- Solo las clases del equipo cuentan en la cobertura ---
# (mantener en sync con $teamInclusions de correr.ps1)
sonar.inclusions=**/comments/Comment*Impl.java,**/objects/ObjectResourceImpl.java,**/pages/PageTagsResourceImpl.java

# --- Attachments excluido del analisis (companero no presenta) ---
sonar.test.exclusions=**/attachments/**
